<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="layout.css">
    <style>
        .book-card {
            width: 300px;
            margin: 20px auto;
            padding: 20px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .book-card:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
<div class="book-card">
    <h1>The Art of Speaking</h1>
    <p><em>by Tushar And Ramesh</em></p>

    <p>
        <strong>Price:</strong>
        <mark>₹799</mark>
        <small>(Inclusive of taxes)</small>
    </p>

    <hr>

    <p>
        This book provides a comprehensive understanding of Speaking.
        <br>
        Ideal for students and professionals.
    </p>
</div>
</body>
</html>
