<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="form.css">

<body>
    <header>
        <h1>Online Book Store</h1>
        <p>Your Gateway to Knowledge</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="bookdet.html">Categories</a></li>

        </ul>
    </nav>
    <main>
        <section>
            <h2>Login to Your Account</h2>
            <form class="login-form">
                <fieldset>
                    <legend>Login</legend>
                    <label for="email">Email:</label>
                    <input type="email" id="email" required placeholder="Enter your email"><br><br>

                    <label for="password">Password:</label>
                    <input type="password" id="password" required placeholder="Enter your password"><br><br>

                    <input type="submit" value="Login">
                    <p>Don't have an account? <a href="registration-form.html">Register here</a></p>
                </fieldset>
            </form>
        </section>
    </main>

    </footer>
