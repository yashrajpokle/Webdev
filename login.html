<!DOCTYPE html>
<html>
<head>
<title>Login Page Validation</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:40px;
}

form{
    width:300px;
}

input{
    display:block;
    width:100%;
    padding:8px;
    margin-bottom:10px;
}

button{
    padding:10px;
    width:100%;
}

.error{
    color:red;
    font-size:13px;
}

input.errorField{
    border:2px solid red;
}

input.successField{
    border:2px solid green;
}

#successMessage{
    color:green;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>

<body>

<h2>Login Form</h2>

<form id="loginForm" onsubmit="return validateForm()">

<label>Email</label>
<input type="text" id="email">
<span id="emailError" class="error"></span>

<label>Password</label>
<input type="password" id="password">
<span id="passwordError" class="error"></span>

<label>Confirm Password</label>
<input type="password" id="confirmPassword">
<span id="confirmPasswordError" class="error"></span>

<button type="submit">Login</button>

<span id="successMessage"></span>

</form>

<script>

document.getElementById("email").addEventListener("keyup",validateEmail);
document.getElementById("password").addEventListener("keyup",validatePassword);
document.getElementById("confirmPassword").addEventListener("keyup",validateConfirmPassword);

function validateEmail(){

let email = document.getElementById("email").value.trim();
let emailError = document.getElementById("emailError");
let emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if(email === "")
{
emailError.textContent = "Email is required";
setError("email");
return false;
}

else if(!emailPattern.test(email))
{
emailError.textContent = "Enter a valid email address";
setError("email");
return false;
}

else
{
emailError.textContent = "";
setSuccess("email");
return true;
}

}

function validatePassword(){

let password = document.getElementById("password").value;
let passwordError = document.getElementById("passwordError");
let passwordPattern = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,}$/;

if(password === "")
{
passwordError.textContent = "Password cannot be empty";
setError("password");
return false;
}

else if(!passwordPattern.test(password))
{
passwordError.textContent =
"Password must contain letters, numbers and be at least 6 characters";
setError("password");
return false;
}

else
{
passwordError.textContent = "";
setSuccess("password");
return true;
}

}

function validateConfirmPassword(){

let password = document.getElementById("password").value;
let confirmPassword = document.getElementById("confirmPassword").value;
let confirmError = document.getElementById("confirmPasswordError");

if(confirmPassword === "")
{
confirmError.textContent = "Confirm your password";
setError("confirmPassword");
return false;
}

else if(password !== confirmPassword)
{
confirmError.textContent = "Passwords do not match";
setError("confirmPassword");
return false;
}

else
{
confirmError.textContent = "";
setSuccess("confirmPassword");
return true;
}

}

function validateForm(){

let validEmail = validateEmail();
let validPassword = validatePassword();
let validConfirm = validateConfirmPassword();

if(validEmail && validPassword && validConfirm)
{
document.getElementById("successMessage").textContent = "Login Successful";
return false;
}
else
{
document.getElementById("successMessage").textContent = "";
return false;
}

}

function setError(id){

let element = document.getElementById(id);
element.classList.add("errorField");
element.classList.remove("successField");

}

function setSuccess(id){

let element = document.getElementById(id);
element.classList.remove("errorField");
element.classList.add("successField");

}

</script>

</body>
</html>
