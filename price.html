<!DOCTYPE html>
<html>
<head>
    <title>Book Comparison</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="table.css">
    <link rel="stylesheet" href="layout.css">
</head>
<body>

<table>
    <caption>Book Price Comparison</caption>

    <thead>
        <tr>
            <th>Book Name</th>
            <th>Author</th>
            <th colspan="2">Price</th>
            <th>Availability</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td rowspan="2">Knowledge of money </td>
            <td rowspan="2">Yashraj</td>
            <td>Paperback</td>
            <td>₹499</td>
            <td>In Stock</td>
        </tr>
        <tr>
            <td>eBook</td>
            <td>₹299</td>
            <td>Available</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="5">Prices subject to change</td>
        </tr>
    </tfoot>
</table>

</body>
</html>
